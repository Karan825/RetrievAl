ai_usage_summary: |
  Used AI coding assistant for architecture review, code analysis, and debugging.
  The pipeline itself runs 100% offline — no candidate data was sent to any external LLM.
  Ranking uses a locally-stored Qwen 2.5 1.5B (GGUF) model and BGE-small-en-v1.5 embeddings.

methodology_summary: |
  5-stage CPU-only pipeline operating fully offline:
  (1) Honeypot elimination — 5 structural data-integrity checks (impossible skill durations,
      overlapping jobs, YOE discrepancies, synthetic-profile patterns).
  (2) JD parsing — offline Qwen 2.5 1.5B extracts must-have skills, disqualifiers,
      domain keywords, seniority target, and YOE constraints into jd_metadata.json.
  (3) Dual-vector semantic matching — BGE-small encodes career descriptions against
      a positive JD vector (core skills + impact signals) minus an adaptive-beta negative
      vector (disqualifiers + anti-patterns). Career jobs weighted by duration and recency.
  (4) Composite scoring — 19 behavioral signal multipliers (activity, response rate,
      GitHub, skill assessments, offer acceptance, market demand, education tier,
      career trajectory, career industry alignment, and more).
  (5) LLM reasoning — Qwen 2.5 1.5B generates fact-grounded, JD-anchored hiring briefs
      for the top 15 candidates; structured templates for ranks 16-100.
  Runs in ~4 minutes on CPU, no network required during ranking.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true
